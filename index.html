<!DOCTYPE html>
<html>
<head>
    <title>Agarz Personalizado</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <canvas id="canvas" style="border: 1px solid #333;"></canvas>
    <div id="overlays" style="display: none;">
        <div id="login-panel">
            <div class="login-container">
                <div class="red-moon"></div>
                <div class="character-silhouette"></div>
                <div class="login-form">
                    <h1 class="logo">AGARZ</h1>
                    <div style="margin-bottom: 20px;">
                        <input id="nick" type="text" class="form-input" placeholder="Nombre de jugador" maxlength="15">
                    </div>
                    <div style="margin-bottom: 20px;">
                        <select id="region" class="form-input" style="padding: 10px;">
                            <option value="1">Región 1</option>
                            <option value="2">Región 2</option>
                            <option value="3">Región 3</option>
                        </select>
                    </div>
                    <button id="playBtn" class="btn-login">ENTRAR AL JUEGO</button>
                    <p class="form-info">Únete a la batalla épica</p>
                </div>
            </div>
        </div>
        <div id="chat_textbox">
            <input type="text" id="chat_input" placeholder="Escribe un mensaje..." style="width: 100%; padding: 10px; border: 1px solid #ff3333; background: #1a1a1a; color: #fff;">
        </div>
    </div>
    
    <script src="https://code.jquery.com/jquery-1.11.1.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
